<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="glass-container auth-container">
        <!-- Login Form -->
        <div id="login-form-container" class="form-section active">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your details to access the calculator</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                
                <div id="login-error" class="error-msg"></div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            
            <div class="toggle-text">
                Don't have an account? <a href="#" id="show-signup">Sign up now</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-form-container" class="form-section">
            <h2>Create Account</h2>
            <p class="subtitle">Join to save your grade history</p>
            
            <form id="signup-form">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="••••••••">
                </div>
                
                <div id="signup-error" class="error-msg"></div>
                
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
            
            <div class="toggle-text">
                Already have an account? <a href="#" id="show-login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
<!-- client- npm run start -->
